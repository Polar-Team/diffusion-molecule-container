name: Lint and Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Build and test container
        run: |
          touch certificate.pem
          docker build -t diffusion-molecule-container:test .
          docker run --rm diffusion-molecule-container:test molecule --version
